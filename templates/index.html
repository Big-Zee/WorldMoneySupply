<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Global M2 Monitor</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
    }

    header {
      width: 100%;
      max-width: 1200px;
      margin-bottom: 20px;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #f8fafc;
      letter-spacing: -0.02em;
    }

    header p {
      font-size: 0.85rem;
      color: #94a3b8;
      margin-top: 4px;
    }

    .controls {
      width: 100%;
      max-width: 1200px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px 16px;
      margin-bottom: 12px;
    }

    .toggles-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 14px;
      align-items: center;
      flex: 1;
    }

    .series-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }

    .series-toggle input[type="checkbox"] {
      width: 14px;
      height: 14px;
      cursor: pointer;
    }

    .series-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .btn-group {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-shrink: 0;
    }

    button {
      padding: 5px 12px;
      font-size: 0.78rem;
      background: #1e293b;
      color: #94a3b8;
      border: 1px solid #334155;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    button:hover {
      background: #334155;
      color: #e2e8f0;
    }

    .chart-wrapper {
      width: 100%;
      max-width: 1200px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      overflow: hidden;
    }

    #chart {
      width: 100%;
      height: 500px;
    }

    #status {
      width: 100%;
      max-width: 1200px;
      margin-top: 10px;
      font-size: 0.78rem;
      color: #64748b;
      text-align: right;
      min-height: 1.2em;
    }
  </style>
</head>
<body>

<header>
  <h1>Global M2 Monitor</h1>
  <p>Broad money supply — year-over-year % change · 11 countries via FRED</p>
</header>

<div class="controls">
  <div class="toggles-row" id="toggles-row">
    <!-- populated by JS -->
  </div>
  <div class="btn-group">
    <button id="select-all">Select All</button>
    <button id="reset-zoom">Reset Zoom</button>
  </div>
</div>

<div class="chart-wrapper">
  <div id="chart"></div>
</div>

<div id="status"></div>

<script>
  const COLORS = {
    US: '#3b82f6', EZ: '#f59e0b', JP: '#ef4444', GB: '#8b5cf6', CA: '#10b981',
    AU: '#f97316', KR: '#06b6d4', ZA: '#84cc16', NO: '#e879f9', CZ: '#fb7185', HU: '#fbbf24'
  };

  const chart = echarts.init(document.getElementById('chart'), null, { renderer: 'canvas' });

  chart.setOption({
    backgroundColor: 'transparent',
    grid: { top: 30, right: 24, bottom: 70, left: 72 },
    tooltip: {
      trigger: 'axis',
      backgroundColor: '#1e293b',
      borderColor: '#334155',
      textStyle: { color: '#e2e8f0', fontSize: 12 },
      formatter(params) {
        if (!params.length) return '';
        const date = new Date(params[0].axisValue)
          .toLocaleDateString('en-US', { year: 'numeric', month: 'short' });
        const lines = params
          .filter(p => p.data != null)
          .sort((a, b) => b.data[1] - a.data[1])
          .map(p => {
            const val = p.data[1];
            const sign = val >= 0 ? '+' : '';
            return `<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${p.color};margin-right:5px;"></span>`
              + `${p.seriesName}: <b>${sign}${val.toFixed(1)}%</b>`;
          });
        return `<b>${date}</b><br/>${lines.join('<br/>')}`;
      }
    },
    xAxis: {
      type: 'time',
      axisLine: { lineStyle: { color: '#334155' } },
      axisLabel: { color: '#64748b', fontSize: 11 },
      splitLine: { show: false }
    },
    yAxis: {
      type: 'value',
      name: 'YoY % Change',
      nameTextStyle: { color: '#64748b', fontSize: 11, padding: [0, 0, 0, -10] },
      axisLine: { show: false },
      axisLabel: {
        color: '#64748b',
        fontSize: 11,
        formatter: v => v.toFixed(1) + '%'
      },
      splitLine: { lineStyle: { color: '#263044', type: 'dashed' } }
    },
    dataZoom: [
      { type: 'inside', xAxisIndex: 0, filterMode: 'filter' },
      {
        type: 'slider',
        xAxisIndex: 0,
        filterMode: 'filter',
        brushSelect: true,
        height: 30,
        bottom: 10,
        fillerColor: 'rgba(59,130,246,0.15)',
        borderColor: '#334155',
        handleStyle: { color: '#3b82f6' },
        textStyle: { color: '#64748b', fontSize: 10 }
      }
    ],
    series: []
  });

  function resetZoom() {
    chart.dispatchAction({ type: 'dataZoom', start: 0, end: 100 });
  }

  document.getElementById('reset-zoom').addEventListener('click', resetZoom);
  chart.getZr().on('dblclick', resetZoom);

  // Select All / Deselect All toggle
  let allSelected = true;
  document.getElementById('select-all').addEventListener('click', function () {
    allSelected = !allSelected;
    this.textContent = allSelected ? 'Select All' : 'Deselect All';
    document.querySelectorAll('.series-toggle input[type="checkbox"]').forEach(cb => {
      cb.checked = allSelected;
      cb.dispatchEvent(new Event('change'));
    });
  });

  function buildToggle(code, name, color) {
    const label = document.createElement('label');
    label.className = 'series-toggle';

    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.id = `toggle-${code}`;
    cb.checked = true;
    cb.style.accentColor = color;

    const dot = document.createElement('span');
    dot.className = 'series-dot';
    dot.style.background = color;

    label.appendChild(cb);
    label.appendChild(dot);
    label.appendChild(document.createTextNode(` ${name} (${code})`));

    cb.addEventListener('change', function () {
      const visible = this.checked;
      chart.setOption({
        series: [{ name: code, lineStyle: { opacity: visible ? 1 : 0 } }]
      });
    });

    return label;
  }

  fetch('/api/data')
    .then(r => r.json())
    .then(json => {
      if (json.error) {
        document.getElementById('status').textContent = json.error;
        return;
      }

      const togglesRow = document.getElementById('toggles-row');
      const seriesOpts = json.countries.map(c => {
        const color = COLORS[c.code] || '#94a3b8';
        togglesRow.appendChild(buildToggle(c.code, c.name, color));
        return {
          name: c.code,
          type: 'line',
          color,
          data: c.data,
          large: true,
          animation: false,
          symbol: 'none',
          lineStyle: { color, width: 1.5 },
          markLine: c.code === 'US' ? {
            silent: true,
            symbol: 'none',
            data: [{ yAxis: 0 }],
            lineStyle: { color: '#475569', type: 'dashed', width: 1 },
            label: { show: false }
          } : undefined
        };
      });

      // Add a shared zero reference line on yAxis via the first series
      chart.setOption({
        yAxis: {
          splitArea: { show: false },
          axisLine: {
            show: true,
            lineStyle: { color: '#334155' }
          }
        },
        series: seriesOpts
      });

      // Determine status bar info
      const allDates = json.countries.flatMap(c => c.data.map(d => d[0]));
      const latestDate = allDates.sort().at(-1) || '';
      document.getElementById('status').textContent =
        `${json.countries.length} countries · latest data: ${latestDate}`;
    })
    .catch(err => {
      document.getElementById('status').textContent = 'Error loading data: ' + err.message;
    });

  window.addEventListener('resize', () => chart.resize());
</script>

</body>
</html>
