<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Global M2 Monitor</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
    }

    header {
      width: 100%;
      max-width: 1200px;
      margin-bottom: 20px;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #f8fafc;
      letter-spacing: -0.02em;
    }

    header p {
      font-size: 0.85rem;
      color: #94a3b8;
      margin-top: 4px;
    }

    .controls {
      width: 100%;
      max-width: 1200px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px 16px;
      margin-bottom: 12px;
    }

    .toggles-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 14px;
      align-items: center;
      flex: 1;
    }

    .series-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }

    .series-toggle input[type="checkbox"] {
      width: 14px;
      height: 14px;
      cursor: pointer;
    }

    .series-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .btn-group {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-shrink: 0;
    }

    button {
      padding: 5px 12px;
      font-size: 0.78rem;
      background: #1e293b;
      color: #94a3b8;
      border: 1px solid #334155;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    button:hover {
      background: #334155;
      color: #e2e8f0;
    }

    button.btn-active {
      background: #3b82f6;
      color: #fff;
      border-color: #3b82f6;
    }

    .chart-wrapper {
      width: 100%;
      max-width: 1200px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      overflow: hidden;
    }

    #chart {
      width: 100%;
      height: 500px;
    }

    #status {
      width: 100%;
      max-width: 1200px;
      margin-top: 10px;
      font-size: 0.78rem;
      color: #64748b;
      text-align: right;
      min-height: 1.2em;
    }

    .accel-label {
      width: 100%;
      max-width: 1200px;
      font-size: 0.78rem;
      color: #64748b;
      margin-top: 16px;
      margin-bottom: 4px;
      letter-spacing: 0.01em;
    }

    .chart-wrapper-accel {
      width: 100%;
      max-width: 1200px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      overflow: hidden;
    }

    #accel-chart {
      width: 100%;
      height: 270px;
    }

    .stats-section {
      width: 100%;
      max-width: 1200px;
      margin-top: 12px;
    }

    #stats-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
      color: #e2e8f0;
    }

    #stats-table th {
      text-align: left;
      padding: 6px 10px;
      color: #64748b;
      font-weight: 500;
      border-bottom: 1px solid #334155;
    }

    #stats-table td {
      padding: 5px 10px;
      border-bottom: 1px solid #1e293b;
    }

    #stats-table tr:hover td { background: #1e293b; }

    .trend-up   { color: #4ade80; }
    .trend-down { color: #f87171; }
    .trend-flat { color: #64748b; }
  </style>
</head>
<body>

<header>
  <h1>Global M2 Monitor</h1>
  <p>Broad money supply — year-over-year % change · 11 countries via FRED</p>
</header>

<div class="controls">
  <div class="toggles-row" id="toggles-row">
    <!-- populated by JS -->
  </div>
  <div class="btn-group">
    <button id="select-all">Select All</button>
    <button id="toggle-ma12">MA12</button>
    <button id="toggle-index">Index</button>
    <button id="range-5y">5Y</button>
    <button id="range-10y">10Y</button>
    <button id="range-20y">20Y</button>
    <button id="range-all" class="btn-active">All</button>
    <button id="reset-zoom">Reset Zoom</button>
  </div>
</div>

<div class="chart-wrapper">
  <div id="chart"></div>
</div>

<p class="accel-label">M2 Acceleration &mdash; &Delta; YoY % / month</p>
<div class="chart-wrapper-accel">
  <div id="accel-chart"></div>
</div>

<div class="stats-section" id="stats-section">
  <table id="stats-table">
    <thead>
      <tr>
        <th>Country</th>
        <th>Latest YoY %</th>
        <th>3M Change</th>
        <th>Trend</th>
      </tr>
    </thead>
    <tbody id="stats-body"></tbody>
  </table>
</div>

<div id="status"></div>

<div id="health-panel" style="width:100%;max-width:1200px;margin:12px auto 0;padding:12px 16px;background:#1e293b;border:1px solid #334155;border-radius:12px;font-size:0.82rem;display:none;">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
    <span style="font-weight:600;color:#e2e8f0;">Scraper Health</span>
    <span id="health-badge" style="padding:3px 10px;border-radius:4px;font-weight:600;font-size:0.78rem;"></span>
  </div>
  <table style="width:100%;border-collapse:collapse;">
    <thead>
      <tr style="color:#64748b;text-align:left;border-bottom:1px solid #334155;">
        <th style="padding:4px 8px;font-weight:500;">Source</th>
        <th style="padding:4px 8px;font-weight:500;">Last Run</th>
        <th style="padding:4px 8px;font-weight:500;">Data Through</th>
        <th style="padding:4px 8px;font-weight:500;text-align:right;">Rows Added</th>
        <th style="padding:4px 8px;font-weight:500;text-align:right;">Duration</th>
        <th style="padding:4px 8px;font-weight:500;text-align:center;">Status</th>
      </tr>
    </thead>
    <tbody id="health-body"></tbody>
  </table>
</div>

<script>
  function timeAgo(isoStr) {
    const diffMs = Date.now() - new Date(isoStr).getTime();
    const mins = Math.floor(diffMs / 60000);
    if (mins < 60) return mins <= 1 ? 'just now' : `${mins}m ago`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return `${hrs}h ago`;
    const days = Math.floor(hrs / 24);
    return `${days}d ago`;
  }

  fetch('/api/scraper-status')
    .then(r => r.json())
    .then(data => {
      const panel = document.getElementById('health-panel');
      const badge = document.getElementById('health-badge');
      const tbody = document.getElementById('health-body');
      if (!data.scrapers || data.scrapers.length === 0) return;
      panel.style.display = 'block';
      const hasError = data.scrapers.some(s => s.status === 'error');
      badge.textContent = hasError ? 'Degraded' : 'All Healthy';
      badge.style.background = hasError ? '#ef4444' : '#10b981';
      badge.style.color = '#fff';
      tbody.innerHTML = data.scrapers.map(s => {
        const ok = s.status === 'success';
        const statusCell = ok
          ? '<span style="color:#4ade80;">✓</span>'
          : `<span style="color:#f87171;" title="${s.error || ''}">✗</span>`;
        return `<tr style="border-bottom:1px solid #1e293b;">
          <td style="padding:5px 8px;color:#e2e8f0;font-weight:500;">${s.scraper}</td>
          <td style="padding:5px 8px;color:#94a3b8;">${timeAgo(s.run_at)}</td>
          <td style="padding:5px 8px;color:#94a3b8;">${s.latest_date || '—'}</td>
          <td style="padding:5px 8px;color:#94a3b8;text-align:right;">${s.rows_added > 0 ? '+' + s.rows_added : s.rows_added}</td>
          <td style="padding:5px 8px;color:#94a3b8;text-align:right;">${s.duration_seconds}s</td>
          <td style="padding:5px 8px;text-align:center;">${statusCell}</td>
        </tr>`;
      }).join('');
    })
    .catch(() => {});
</script>

<script>
  const COLORS = {
    US: '#3b82f6', EZ: '#f59e0b', JP: '#ef4444', GB: '#8b5cf6', CA: '#10b981',
    AU: '#f97316', KR: '#06b6d4', ZA: '#84cc16', NO: '#e879f9', CZ: '#fb7185', HU: '#fbbf24'
  };

  function rollingAvg(data, n) {
    const result = [];
    for (let i = 0; i < data.length; i++) {
      if (i < n - 1) { result.push([data[i][0], null]); continue; }
      let sum = 0, count = 0;
      for (let j = i - n + 1; j <= i; j++) {
        const v = data[j][1];
        if (v != null && !isNaN(v)) { sum += v; count++; }
      }
      result.push([data[i][0], count > 0 ? sum / count : null]);
    }
    return result;
  }

  function accelData(data) {
    return data.map((d, i) => {
      if (i === 0 || d[1] == null || data[i-1][1] == null) return [d[0], null];
      return [d[0], d[1] - data[i-1][1]];
    });
  }

  const rawData = {};

  function indexedSeries(rawArr, baseDate) {
    const baseIdx = rawArr.findIndex(d => d[0] >= baseDate);
    if (baseIdx === -1) return rawArr.map(d => [d[0], null]);
    const baseVal = rawArr[baseIdx][1];
    if (!baseVal) return rawArr.map(d => [d[0], null]);
    return rawArr.map(d => [d[0], d[1] != null ? parseFloat(((d[1] / baseVal) * 100).toFixed(2)) : null]);
  }

  function getZoomRange() {
    const dz = chart.getOption().dataZoom?.[0];
    if (!dz) return [-Infinity, Infinity];
    const startMs = dz.startValue ?? -Infinity;
    const endMs = dz.endValue ?? Infinity;
    return [startMs, endMs];
  }

  function buildStatsTable(startMs, endMs) {
    const rows = [];
    if (typeof json === 'undefined') return;
    json.countries.forEach(c => {
      const visible = c.data.filter(d => {
        const t = new Date(d[0]).getTime();
        return t >= startMs && t <= endMs && d[1] != null;
      });
      if (!visible.length) return;

      const latest = visible[visible.length - 1][1];
      const ago3 = visible.length >= 3 ? visible[visible.length - 3][1] : null;
      const delta = ago3 != null ? latest - ago3 : null;
      const arrow = delta == null ? '—'
        : delta > 0.1 ? '↑' : delta < -0.1 ? '↓' : '→';
      const arrowClass = delta == null ? 'trend-flat'
        : delta > 0.1 ? 'trend-up' : delta < -0.1 ? 'trend-down' : 'trend-flat';
      const sign = latest >= 0 ? '+' : '';
      const deltaSign = delta != null ? (delta >= 0 ? '+' : '') : '';

      rows.push({ code: c.code, name: c.name, latest, delta, arrow, arrowClass, sign, deltaSign });
    });

    rows.sort((a, b) => b.latest - a.latest);

    const tbody = document.getElementById('stats-body');
    tbody.innerHTML = rows.map(r => {
      const color = COLORS[r.code] || '#94a3b8';
      return `<tr>
        <td><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${color};margin-right:6px;"></span>${r.code}</td>
        <td>${r.sign}${r.latest.toFixed(2)}%</td>
        <td>${r.delta != null ? r.deltaSign + r.delta.toFixed(2) + '%' : '—'}</td>
        <td class="${r.arrowClass}">${r.arrow}</td>
      </tr>`;
    }).join('');
  }

  const chart = echarts.init(document.getElementById('chart'), null, { renderer: 'canvas' });

  chart.setOption({
    backgroundColor: 'transparent',
    grid: { top: 30, right: 24, bottom: 70, left: 72 },
    tooltip: {
      trigger: 'axis',
      backgroundColor: '#1e293b',
      borderColor: '#334155',
      textStyle: { color: '#e2e8f0', fontSize: 12 },
      formatter(params) {
        if (!params.length) return '';
        const date = new Date(params[0].axisValue)
          .toLocaleDateString('en-US', { year: 'numeric', month: 'short' });
        const lines = params
          .filter(p => p.data != null)
          .sort((a, b) => b.data[1] - a.data[1])
          .map(p => {
            const val = p.data[1];
            const sign = val >= 0 ? '+' : '';
            return `<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${p.color};margin-right:5px;"></span>`
              + `${p.seriesName}: <b>${sign}${val.toFixed(1)}%</b>`;
          });
        return `<b>${date}</b><br/>${lines.join('<br/>')}`;
      }
    },
    xAxis: {
      type: 'time',
      axisLine: { lineStyle: { color: '#334155' } },
      axisLabel: { color: '#64748b', fontSize: 11 },
      splitLine: { show: false }
    },
    yAxis: {
      type: 'value',
      name: 'YoY % Change',
      nameTextStyle: { color: '#64748b', fontSize: 11, padding: [0, 0, 0, -10] },
      axisLine: { show: false },
      axisLabel: {
        color: '#64748b',
        fontSize: 11,
        formatter: v => v.toFixed(1) + '%'
      },
      splitLine: { lineStyle: { color: '#263044', type: 'dashed' } }
    },
    dataZoom: [
      { type: 'inside', xAxisIndex: 0, filterMode: 'filter' },
      {
        type: 'slider',
        xAxisIndex: 0,
        filterMode: 'filter',
        brushSelect: true,
        height: 30,
        bottom: 10,
        fillerColor: 'rgba(59,130,246,0.15)',
        borderColor: '#334155',
        handleStyle: { color: '#3b82f6' },
        textStyle: { color: '#64748b', fontSize: 10 }
      }
    ],
    series: []
  });

  let ma12Active = false;

  const accelChart = echarts.init(document.getElementById('accel-chart'), null, { renderer: 'canvas' });

  accelChart.setOption({
    backgroundColor: 'transparent',
    grid: { top: 16, right: 24, bottom: 70, left: 72 },
    tooltip: {
      trigger: 'axis',
      backgroundColor: '#1e293b',
      borderColor: '#334155',
      textStyle: { color: '#e2e8f0', fontSize: 12 },
      formatter(params) {
        if (!params.length) return '';
        const date = new Date(params[0].axisValue)
          .toLocaleDateString('en-US', { year: 'numeric', month: 'short' });
        const lines = params
          .filter(p => p.data != null && p.data[1] != null)
          .sort((a, b) => b.data[1] - a.data[1])
          .map(p => {
            const val = p.data[1];
            const sign = val >= 0 ? '+' : '';
            return `<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${p.color};margin-right:5px;"></span>`
              + `${p.seriesName}: <b>${sign}${val.toFixed(2)}%</b>`;
          });
        return `<b>${date}</b><br/>${lines.join('<br/>')}`;
      }
    },
    xAxis: {
      type: 'time',
      axisLine: { lineStyle: { color: '#334155' } },
      axisLabel: { color: '#64748b', fontSize: 11 },
      splitLine: { show: false }
    },
    yAxis: {
      type: 'value',
      name: 'Δ YoY %',
      nameTextStyle: { color: '#64748b', fontSize: 11, padding: [0, 0, 0, -10] },
      axisLine: { show: false },
      axisLabel: { color: '#64748b', fontSize: 11, formatter: v => v.toFixed(1) + '%' },
      splitLine: { lineStyle: { color: '#263044', type: 'dashed' } }
    },
    dataZoom: [
      { type: 'inside', xAxisIndex: 0, filterMode: 'filter' },
      {
        type: 'slider',
        xAxisIndex: 0,
        filterMode: 'filter',
        brushSelect: true,
        height: 30,
        bottom: 10,
        fillerColor: 'rgba(59,130,246,0.15)',
        borderColor: '#334155',
        handleStyle: { color: '#3b82f6' },
        textStyle: { color: '#64748b', fontSize: 10 }
      }
    ],
    series: []
  });

  echarts.connect([chart, accelChart]);

  function resetZoom() {
    chart.dispatchAction({ type: 'dataZoom', start: 0, end: 100 });
  }

  document.getElementById('reset-zoom').addEventListener('click', resetZoom);
  chart.getZr().on('dblclick', resetZoom);

  // Select All / Deselect All toggle
  let allSelected = true;
  document.getElementById('select-all').addEventListener('click', function () {
    allSelected = !allSelected;
    this.textContent = allSelected ? 'Select All' : 'Deselect All';
    document.querySelectorAll('.series-toggle input[type="checkbox"]').forEach(cb => {
      cb.checked = allSelected;
      cb.dispatchEvent(new Event('change'));
    });
  });

  function buildToggle(code, name, color) {
    const label = document.createElement('label');
    label.className = 'series-toggle';

    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.id = `toggle-${code}`;
    cb.checked = true;
    cb.style.accentColor = color;

    const dot = document.createElement('span');
    dot.className = 'series-dot';
    dot.style.background = color;

    label.appendChild(cb);
    label.appendChild(dot);
    label.appendChild(document.createTextNode(` ${name} (${code})`));

    cb.addEventListener('change', function () {
      const visible = this.checked;
      chart.setOption({ series: [{ name: code, lineStyle: { opacity: visible ? 1 : 0 } }] });
      chart.setOption({
        series: [{
          name: `${code}_ma12`,
          lineStyle: { opacity: (visible && ma12Active) ? 0.6 : 0 },
          itemStyle: { opacity: (visible && ma12Active) ? 0.6 : 0 }
        }]
      });
      accelChart.setOption({ series: [{ name: code, lineStyle: { opacity: visible ? 1 : 0 } }] });
    });

    return label;
  }

  // FRED USREC — US recession periods (start inclusive, end inclusive)
  const RECESSIONS = [
    ['1960-04-01', '1961-02-01'],
    ['1969-12-01', '1970-11-01'],
    ['1973-11-01', '1975-03-01'],
    ['1980-01-01', '1980-07-01'],
    ['1981-07-01', '1982-11-01'],
    ['1990-07-01', '1991-03-01'],
    ['2001-03-01', '2001-11-01'],
    ['2007-12-01', '2009-06-01'],
    ['2020-02-01', '2020-04-01'],
  ];

  let json;
  let indexActive = false;

  function applyIndexMode() {
    const dz = chart.getOption().dataZoom[0];
    let baseDate;
    if (dz.startValue != null) {
      baseDate = new Date(dz.startValue).toISOString().slice(0, 10);
    } else {
      const firstCode = Object.keys(rawData)[0];
      baseDate = rawData[firstCode]?.[0]?.[0] ?? '1960-01-01';
    }

    json.countries.forEach(c => {
      const seriesData = indexActive
        ? indexedSeries(rawData[c.code], baseDate)
        : c.data;
      chart.setOption({ series: [{ name: c.code, data: seriesData }] });
    });

    if (indexActive) {
      chart.setOption({ yAxis: { name: 'Index\n(start=100)', axisLabel: { formatter: v => v.toFixed(0) } } });
    } else {
      chart.setOption({ yAxis: { name: 'YoY % Change', axisLabel: { formatter: v => v.toFixed(1) + '%' } } });
    }
  }

  document.getElementById('toggle-index').addEventListener('click', function () {
    indexActive = !indexActive;
    this.classList.toggle('btn-active', indexActive);
    applyIndexMode();
  });

  fetch('/api/data')
    .then(r => r.json())
    .then(_json => {
      json = _json;
      if (json.error) {
        document.getElementById('status').textContent = json.error;
        return;
      }

      const togglesRow = document.getElementById('toggles-row');
      const seriesOpts = [];
      const ma12SeriesOpts = [];
      const accelSeriesOpts = [];

      json.countries.forEach(c => {
        rawData[c.code] = c.raw || [];
        const color = COLORS[c.code] || '#94a3b8';
        togglesRow.appendChild(buildToggle(c.code, c.name, color));

        seriesOpts.push({
          name: c.code,
          type: 'line',
          color,
          data: c.data,
          large: true,
          animation: false,
          symbol: 'none',
          lineStyle: { color, width: 1.5 },
          markLine: c.code === 'US' ? {
            silent: true, symbol: 'none',
            data: [{ yAxis: 0 }],
            lineStyle: { color: '#475569', type: 'dashed', width: 1 },
            label: { show: false }
          } : undefined
        });

        ma12SeriesOpts.push({
          name: `${c.code}_ma12`,
          type: 'line',
          color,
          data: rollingAvg(c.data, 12),
          large: true,
          animation: false,
          symbol: 'none',
          lineStyle: { color, width: 1, type: 'dashed', opacity: 0 },
          itemStyle: { opacity: 0 },
          tooltip: { show: false }
        });

        accelSeriesOpts.push({
          name: c.code,
          type: 'line',
          color,
          data: accelData(c.data),
          large: true,
          animation: false,
          symbol: 'none',
          lineStyle: { color, width: 1.5 }
        });
      });

      const mkRecession = (extraMarkLine) => ({
        name: '_recessions',
        type: 'line',
        data: [],
        silent: true,
        animation: false,
        symbol: 'none',
        lineStyle: { opacity: 0 },
        markArea: {
          silent: true,
          itemStyle: { color: 'rgba(200, 60, 60, 0.10)' },
          data: RECESSIONS.map(([s, e]) => [{ xAxis: s }, { xAxis: e }])
        },
        ...(extraMarkLine ? { markLine: extraMarkLine } : {})
      });

      const zeroLine = {
        silent: true, symbol: 'none',
        data: [{ yAxis: 0 }],
        lineStyle: { color: '#475569', type: 'dashed', width: 1 },
        label: { show: false }
      };

      chart.setOption({
        yAxis: {
          splitArea: { show: false },
          axisLine: { show: true, lineStyle: { color: '#334155' } }
        },
        series: [...seriesOpts, ...ma12SeriesOpts, mkRecession()]
      });

      accelChart.setOption({
        yAxis: {
          splitArea: { show: false },
          axisLine: { show: true, lineStyle: { color: '#334155' } }
        },
        series: [...accelSeriesOpts, mkRecession(zeroLine)]
      });

      // Initial stats table render
      const [initS, initE] = getZoomRange();
      buildStatsTable(initS, initE);

      // Update stats table and index on zoom
      chart.on('datazoom', () => {
        const [s, e] = getZoomRange();
        buildStatsTable(s, e);
        if (indexActive) applyIndexMode();
      });

      // Date range preset buttons
      const rangeButtons = ['range-5y', 'range-10y', 'range-20y', 'range-all'];

      function setDateRange(yearsBack) {
        rangeButtons.forEach(id => document.getElementById(id).classList.remove('btn-active'));
        const btnId = yearsBack ? `range-${yearsBack}y` : 'range-all';
        document.getElementById(btnId).classList.add('btn-active');

        if (yearsBack === null) {
          chart.dispatchAction({ type: 'dataZoom', start: 0, end: 100 });
        } else {
          const now = new Date();
          const start = new Date(now.getFullYear() - yearsBack, now.getMonth(), 1).getTime();
          chart.dispatchAction({ type: 'dataZoom', startValue: start, endValue: now.getTime() });
        }
      }

      document.getElementById('range-5y').addEventListener('click', () => setDateRange(5));
      document.getElementById('range-10y').addEventListener('click', () => setDateRange(10));
      document.getElementById('range-20y').addEventListener('click', () => setDateRange(20));
      document.getElementById('range-all').addEventListener('click', () => setDateRange(null));

      document.getElementById('toggle-ma12').addEventListener('click', function () {
        ma12Active = !ma12Active;
        this.classList.toggle('btn-active', ma12Active);
        json.countries.forEach(c => {
          const checked = document.getElementById(`toggle-${c.code}`).checked;
          const show = ma12Active && checked;
          chart.setOption({
            series: [{
              name: `${c.code}_ma12`,
              lineStyle: { opacity: show ? 0.6 : 0 },
              itemStyle: { opacity: show ? 0.6 : 0 }
            }]
          });
        });
      });

      // Determine status bar info
      const allDates = json.countries.flatMap(c => c.data.map(d => d[0]));
      const latestDate = allDates.sort().at(-1) || '';
      document.getElementById('status').textContent =
        `${json.countries.length} countries · latest data: ${latestDate}`;
    })
    .catch(err => {
      document.getElementById('status').textContent = 'Error loading data: ' + err.message;
    });

  window.addEventListener('resize', () => { chart.resize(); accelChart.resize(); });
</script>

</body>
</html>
